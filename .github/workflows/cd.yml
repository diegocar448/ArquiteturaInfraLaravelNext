name: CD

on:
  push:
    branches: [main]

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/orderly/backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/orderly/frontend

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)
          echo "sha_short=$SHA_SHORT" >> $GITHUB_OUTPUT
          echo "date=$(date -u +%Y%m%d)" >> $GITHUB_OUTPUT

      # ---- Backend image ----
      - name: Build & Push Backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/php/Dockerfile
          target: production
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.sha_short }}
            ${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ---- Frontend image ----
      - name: Build & Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/node/Dockerfile
          target: production
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.sha_short }}
            ${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=/api

      # ---- Deploy to EKS ----
      deploy:
        name: Deploy to EKS
        runs-on: ubuntu-latest
        needs: build-and-push
        # Apenas se o build passou
        if: success()
        environment: production

        steps:
          - uses: actions/checkout@v4

          - name: Configure AWS credentials
            uses: aws-actions/configure-aws-credentials@v4
            with:
              aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
              aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
              aws-region: us-east-1

          - name: Update kubeconfig
            run: |
              aws eks update-kubeconfig --region us-east-1 --name orderly-prod

          - name: Set image tags
            run: |
              SHA_SHORT=$(git rev-parse --short HEAD)
              cd k8s/overlays/prod
              kustomize edit set image \
                orderly/backend=${{ env.BACKEND_IMAGE }}:${SHA_SHORT} \
                orderly/frontend=${{ env.FRONTEND_IMAGE }}:${SHA_SHORT}

          - name: Deploy to Kubernetes
            run: |
              kubectl apply -k k8s/overlays/prod
              kubectl rollout status deployment/prod-backend-api -n orderly --timeout=300s
              kubectl rollout status deployment/prod-frontend -n orderly --timeout=300s

          - name: Verify deployment
            run: |
              echo "=== Pods ==="
              kubectl get pods -n orderly
              echo "=== Services ==="
              kubectl get svc -n orderly
              echo "=== Ingress ==="
              kubectl get ingress -n orderly