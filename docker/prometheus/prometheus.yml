global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Metricas do Laravel (via endpoint /api/v1/metrics)
  - job_name: 'laravel'
    metrics_path: '/api/v1/metrics'
    static_configs:
      - targets: ['nginx:80']
        labels:
          app: 'orderly'
          service: 'backend'

  # Metricas do Redis
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          app: 'orderly'
          service: 'redis'

  # Metricas do PostgreSQL
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          app: 'orderly'
          service: 'postgres'

  # Metricas do Nginx
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx-exporter:9113']
        labels:
          app: 'orderly'
          service: 'nginx'

  # Metricas do proprio Prometheus
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']