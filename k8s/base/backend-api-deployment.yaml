# ============================================
# Backend API - Deployment
# ============================================
# Roda PHP-FPM servindo a API Laravel.
# Escalavel horizontalmente via HPA.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-api
  namespace: orderly
  labels:
    app.kubernetes.io/name: orderly
    app.kubernetes.io/component: backend-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: orderly
      app.kubernetes.io/component: backend-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: orderly
        app.kubernetes.io/component: backend-api
    spec:
      containers:
        - name: backend-api
          image: orderly/backend:latest
          ports:
            - containerPort: 9000
              protocol: TCP
          env:
            - name: CONTAINER_ROLE
              value: "api"
          envFrom:
            - configMapRef:
                name: orderly-config
            - secretRef:
                name: orderly-secret
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          # Readiness: o pod so recebe trafego quando esta pronto
          readinessProbe:
            tcpSocket:
              port: 9000
            initialDelaySeconds: 10
            periodSeconds: 5
          # Liveness: reinicia o pod se travar
          livenessProbe:
            tcpSocket:
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 10
          # Startup: da tempo para o primeiro boot (cache warmup)
          startupProbe:
            tcpSocket:
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
      # Distribuir pods entre AZs
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/component: backend-api