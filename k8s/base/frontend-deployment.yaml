# ============================================
# Frontend - Deployment
# ============================================
# Next.js em modo standalone (server.js).
# Escalavel horizontalmente via HPA.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: orderly
  labels:
    app.kubernetes.io/name: orderly
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: orderly
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: orderly
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: frontend
          image: orderly/frontend:latest
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            - name: INTERNAL_API_URL
              value: "http://backend-api:9000/api"
          envFrom:
            - configMapRef:
                name: orderly-config
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/component: frontend