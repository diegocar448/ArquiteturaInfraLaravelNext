# ============================================
# Frontend - Service (ClusterIP)
# ============================================
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: orderly
  labels:
    app.kubernetes.io/name: orderly
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: orderly
    app.kubernetes.io/component: frontend
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP