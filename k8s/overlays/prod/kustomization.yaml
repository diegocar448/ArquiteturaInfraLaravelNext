# ============================================
# Kustomize Overlay - Prod
# ============================================
# Mais replicas, mais recursos, imagens com tag de commit (nunca latest)
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namePrefix: prod-

images:
  - name: orderly/backend
    newName: 123456789012.dkr.ecr.us-east-1.amazonaws.com/orderly/backend
    newTag: abc1234
  - name: orderly/frontend
    newName: 123456789012.dkr.ecr.us-east-1.amazonaws.com/orderly/frontend
    newTag: abc1234

patches:
  # Mais replicas em prod
  - target:
      kind: Deployment
      name: backend-api
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3
  - target:
      kind: Deployment
      name: backend-worker
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: Deployment
      name: frontend
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3
  # Mais recursos em prod
  - target:
      kind: Deployment
      name: backend-api
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 250m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "1"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 1Gi
  # HPA mais agressivo em prod
  - target:
      kind: HorizontalPodAutoscaler
      name: backend-api-hpa
    patch: |
      - op: replace
        path: /spec/minReplicas
        value: 3
      - op: replace
        path: /spec/maxReplicas
        value: 15